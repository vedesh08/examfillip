<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamFillip : Stay Tuned!</title>
<link rel="icon" href="static/y4446NsThlsr/logo.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #0a0a0c;
    color: #ffffff;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    opacity: 0;
    transition: opacity 1s ease-in;
}

body.loaded {
    opacity: 1;
}

/* 🌌 MOVING DOTS CANVAS */
#canvas-dots {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    pointer-events: none;
}

/* Background Blob */
.visual-loop {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px;
    background: linear-gradient(45deg, #0052D4, #4361ee, #f48220);
    filter: blur(80px);
    border-radius: 50%;
    opacity: 0.15;
    z-index: -1;
}

.container {
    text-align: center;
    padding: 2rem 1.5rem;
    max-width: 700px;
    margin: auto;
    z-index: 1;
}

/* 🚀 LOGO SECTION: AD STYLE + YOUR ORIGINAL HOVER */
.logo-intro-wrapper {
    opacity: 0;
    transform: translateY(30px);
    animation: revealEntry 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    animation-delay: 0.5s;
    margin-bottom: 0.5rem;
}

@keyframes revealEntry {
    to { opacity: 1; transform: translateY(0); }
}

.logo-box {
    display: inline-block;
    animation: logoFloat 4s ease-in-out infinite;
}

.logo-box img {
    max-width: 320px;
    height: auto;
    filter: drop-shadow(0 0 15px rgba(244, 130, 32, 0.2));
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.logo-box:hover img {
    transform: scale(1.1) translateY(-10px);
    filter: brightness(1.2) drop-shadow(0 0 30px rgba(244, 130, 32, 0.5));
}

@keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

/* 🧱 AD-STYLE SEQUENCING FOR YOUR ELEMENTS */
.status-badge {
    display: inline-block;
    padding: 6px 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 100px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
    color: #f48220;
    opacity: 0;
    animation: revealBadge 0.8s ease-out forwards, pulse 2s infinite;
    animation-delay: 1.2s, 2s;
}

@keyframes revealBadge {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(244, 130, 32, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(244, 130, 32, 0); }
    100% { box-shadow: 0 0 0 0 rgba(244, 130, 32, 0); }
}

h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 800;
    margin-bottom: 1rem;
    background: linear-gradient(to bottom, #fff 40%, #999);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    animation: revealUp 1s ease-out forwards;
    animation-delay: 1.6s;
}

p {
    font-size: 1.1rem;
    color: #a1a1aa;
    line-height: 1.6;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: revealUp 1s ease-out forwards;
    animation-delay: 2s;
}

@keyframes revealUp {
    from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

/* 🎡 YOUR ORIGINAL CHAOTIC LOADER ANIMATIONS */
.loader-wrapper {
    position: relative;
    width: 90px; height: 90px;
    margin: 0 auto 2.5rem auto;
    opacity: 0;
    animation: fadeIn 1s forwards;
    animation-delay: 2.4s;
}

.dot {
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f48220, #4361ee);
    box-shadow: 0 0 12px rgba(244, 130, 32, 0.5);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
}

/* Back to your original chaos paths */
.dot:nth-child(1) { animation: chaos1 2.4s ease-in-out infinite; }
.dot:nth-child(2) { animation: chaos2 2.4s ease-in-out infinite; }
.dot:nth-child(3) { animation: chaos3 2.4s ease-in-out infinite; }
.dot:nth-child(4) { animation: chaos4 2.4s ease-in-out infinite; }

@keyframes chaos1 {
    0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
    25%  { transform: translate(-50%, -50%) translate(25px, -20px) scale(1.3); }
    50%  { transform: translate(-50%, -50%) translate(-20px, -25px) scale(0.8); }
    75%  { transform: translate(-50%, -50%) translate(-25px, 20px) scale(1.2); }
    100% { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
}
@keyframes chaos2 {
    0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
    25%  { transform: translate(-50%, -50%) translate(-25px, -15px) scale(1.2); }
    50%  { transform: translate(-50%, -50%) translate(-10px, 25px) scale(0.9); }
    75%  { transform: translate(-50%, -50%) translate(25px, 15px) scale(1.3); }
    100% { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
}
@keyframes chaos3 {
    0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
    25%  { transform: translate(-50%, -50%) translate(20px, 25px) scale(1.1); }
    50%  { transform: translate(-50%, -50%) translate(25px, -10px) scale(1.3); }
    75%  { transform: translate(-50%, -50%) translate(-20px, -20px) scale(0.8); }
    100% { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
}
@keyframes chaos4 {
    0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
    25%  { transform: translate(-50%, -50%) translate(-20px, 20px) scale(1.25); }
    50%  { transform: translate(-50%, -50%) translate(20px, 20px) scale(0.85); }
    75%  { transform: translate(-50%, -50%) translate(15px, -25px) scale(1.2); }
    100% { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
}

.slogan {
    font-size: 0.9rem; font-weight: 500; color: #ffffff;
    letter-spacing: 3px; text-transform: uppercase;
    opacity: 0; line-height: 1.8;
    animation: fadeInSlogan 1.2s forwards;
    animation-delay: 2.8s;
}

@keyframes fadeInSlogan { to { opacity: 0.6; } }

footer {
    width: 100%; padding: 20px; text-align: center;
    font-size: 0.8rem; color: #444; margin-top: auto;
    opacity: 0; animation: fadeInSlogan 1s forwards;
    animation-delay: 3.2s;
}

@keyframes fadeIn { to { opacity: 1; } }

@media (max-width: 480px) { h1 { font-size: 1.8rem; } p { font-size: 1rem; } }
</style>
</head>

<body>

<canvas id="canvas-dots"></canvas>
<div class="visual-loop"></div>

<div class="container">
    <div class="logo-intro-wrapper">
        <div class="logo-box">
            <a href="https://examfillip.vercel.app/">
            <img src="static/y4446NsThlsr/logowithname.png" alt="ExamFillip"></a>
        </div>
    </div>

    <div class="status-badge">THIS SITE IS UNDER CONSTRUCTION 🚧</div>

    <h1>Leveling up your <br>Prep Experience.</h1>

    <p>
        We're building something special for the next generation of achievers.
        High-quality resources and a smoother journey are on the way.
    </p>

    <div class="loader-wrapper">
        <div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
    </div>

    <div class="slogan">
        Your Catalyst for Competitive Exams<br>Coming Soon
    </div>
</div>

<footer>&copy; 2026 ExamFillip. Stay Tuned!</footer>

<script>
    window.onload = () => { document.body.classList.add('loaded'); };

    // Moving Dots Background Script
    const canvas = document.getElementById('canvas-dots');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.s = Math.random() * 1.5;
            this.vx = Math.random() * 0.4 - 0.2;
            this.vy = Math.random() * 0.4 - 0.2;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.reset();
        }
        draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill();
        }
    }
    for(let i=0; i<80; i++) particles.push(new Particle());
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(anim);
    }
    anim();
</script>

</body>
</html>
